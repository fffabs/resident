<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: "Suisse Intl";
        font-weight: 500;
        src: url("../assets/fonts/suisseintl-medium/SuisseIntl-Medium-WebS.woff2")
            format("woff2"),
          url("../assets/fonts/suisseintl-medium/SuisseIntl-Medium-WebS.woff")
            format("woff");
      }
      @font-face {
        font-family: "Suisse Intl";
        font-weight: 700;
        src: url("../assets/fonts/suisseintl-bold/SuisseIntl-Bold-WebS.woff2")
            format("woff2"),
          url("../assets/fonts/suisseintl-bold/SuisseIntl-Bold-WebS.woff")
            format("woff");
      }
      @font-face {
        font-family: "Suisse Intl";
        font-weight: 400;
        src: url("../assets/fonts/suisseintl-regular/SuisseIntl-Regular-WebS.woff2")
            format("woff2"),
          url("../assets/fonts/suisseintl-regular/SuisseIntl-Regular-WebS.woff")
            format("woff");
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        background: #ffffff;
        font-family: "Suisse Intl", -apple-system, sans-serif;
        color: #0a0a0a;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        display: flex;
      }

      .text {
        position: relative;
        width: 640px;
        padding: 64px 56px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 2;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      .brand-name {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .hero {
        font-size: 84px;
        font-weight: 500;
        letter-spacing: -0.025em;
        line-height: 0.92;
      }

      .footer {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .tagline {
        font-size: 22px;
        font-weight: 500;
        opacity: 0.6;
      }

      .url {
        font-size: 18px;
        font-weight: 500;
        opacity: 0.4;
      }

      .image {
        position: relative;
        flex: 1;
        background-image: url("../assets/island.webp");
        background-position: center center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      /* Magenta glow on the portal — same as homepage */
      .portal-glow {
        position: absolute;
        left: 47%;
        top: 32%;
        width: 30%;
        height: 38%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          ellipse at center,
          rgba(255, 100, 220, 0.85) 0%,
          rgba(248, 102, 251, 0.45) 25%,
          rgba(248, 102, 251, 0.12) 55%,
          transparent 100%
        );
        filter: blur(20px);
        mix-blend-mode: screen;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="text">
        <div class="brand">
          <svg class="brand-mark" viewBox="0 0 32 32" fill="currentColor">
            <circle cx="24.5" cy="24.5" r="3" />
            <circle cx="14.1" cy="26.4" r="2.6" />
            <circle cx="5.6" cy="17.9" r="2.1" />
            <circle cx="7.5" cy="7.5" r="2.1" />
            <circle cx="17.9" cy="5.6" r="2.6" />
            <circle cx="26.4" cy="14.1" r="3" />
          </svg>
          <span class="brand-name">Resident</span>
        </div>

        <h1 class="hero">AI that lives<br />with your data.</h1>

        <div class="footer">
          <div class="tagline">Small, owned AI computers.</div>
          <div class="url">resident.computer</div>
        </div>
      </div>

      <div class="image">
        <div class="portal-glow"></div>
      </div>
    </div>
  </body>
</html>
