<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 180px;
        height: 180px;
        background: #f866fb;
        display: grid;
        place-items: center;
      }
      svg {
        width: 124px;
        height: 124px;
      }
      circle { fill: #ffffff; }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 32 32">
      <circle cx="24.5" cy="24.5" r="3" />
      <circle cx="14.1" cy="26.4" r="2.6" />
      <circle cx="5.6" cy="17.9" r="2.1" />
      <circle cx="7.5" cy="7.5" r="2.1" />
      <circle cx="17.9" cy="5.6" r="2.6" />
      <circle cx="26.4" cy="14.1" r="3" />
    </svg>
  </body>
</html>
